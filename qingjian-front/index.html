<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>青荐</title>
  <link rel="icon" href="/imgs/logo.svg" type="image/svg+xml">
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">

  <link href="./css/index.css" rel="stylesheet">
  <link href="./css/main.css" rel="stylesheet">

  <style type="text/css">
      .el-input__inner {
          border-radius: 20px;
      }
  </style>
</head>
<body>
<div id="app">
  <div class="search-bar">
    <div class="logo-mini" onclick="location.href='/'">
      <img src="/imgs/logo.svg" alt="青荐" style="height: 32px; width: 32px; border-radius: 8px; vertical-align: middle;">
    </div>
    <div class="city-btn" @click="showCitySelect">杭州 <i class="el-icon-arrow-down"></i></div>
    <div class="search-input">
      <el-input size="mini" placeholder="请输入商户名、地点" v-model="searchKeyword" @keyup.native.enter="handleSearch">
        <i slot="prefix" class="el-input__icon el-icon-search"></i>
      </el-input>
    </div>
    <div class="header-icon" @click="toPage(4)"><i class="el-icon-user"></i></div>
  </div>
  <div class="type-list">
    <div class="type-box" v-for="t in types" :key="t.id" @click="toShopList(t.id, t.name)">
      <div class="type-view"><img :src="'/imgs/' + t.icon" alt=""></div>
      <div class="type-text">{{t.name}}</div>
    </div>
  </div>
  <!-- AI智能推荐 -->
  <div class="recommend-section" v-if="recommendedShops.length > 0">
    <div class="section-header">
      <span class="section-title"> AI 为你推荐</span>
      <span class="section-more" @click="toShopList(0, '推荐')">查看更多 ›</span>
    </div>
    <div class="recommend-list">
      <div class="recommend-item" v-for="s in recommendedShops" :key="s.id" @click="toShopDetail(s)">
        <div class="recommend-img"><img :src="s.images ? s.images.split(',')[0] : '/imgs/icons/default-icon.png'" alt=""></div>
        <div class="recommend-info">
          <div class="recommend-name">{{s.name}}</div>
          <div class="recommend-tags">
            <span class="tag-score">⭐ {{s.score}}</span>
            <span class="tag-sold">月售{{s.sold || 0}}</span>
          </div>
          <div class="recommend-area">{{s.areaName || s.area}}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="blog-tabs">
    <div :class="['blog-tab', { active: activeTab === 'hot' }]" @click="switchTab('hot')">推荐</div>
    <div :class="['blog-tab', { active: activeTab === 'follow' }]" @click="switchTab('follow')">关注</div>
  </div>
  <div class="blog-list" @scroll="onScroll">
    <div class="blog-box" v-for="b in blogs" :key="b.id">
      <div class="blog-img" @click="toBlogDetail(b)"><img :src="b.img" alt=""></div>
      <div class="blog-title">{{b.title}}</div>
      <div class="blog-foot">
        <div class="blog-user-icon"><img :src="b.icon || '/imgs/icons/default-icon.png'" alt=""></div>
        <div class="blog-user-name">{{b.name}}</div>
        <div class="blog-liked" @click="addLike(b)">
          <svg t="1646634642977" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2187" width="14" height="14">
            <path d="M160 944c0 8.8-7.2 16-16 16h-32c-26.5 0-48-21.5-48-48V528c0-26.5 21.5-48 48-48h32c8.8 0 16 7.2 16 16v448zM96 416c-53 0-96 43-96 96v416c0 53 43 96 96 96h96c17.7 0 32-14.3 32-32V448c0-17.7-14.3-32-32-32H96zM505.6 64c16.2 0 26.4 8.7 31 13.9 4.6 5.2 12.1 16.3 10.3 32.4l-23.5 203.4c-4.9 42.2 8.6 84.6 36.8 116.4 28.3 31.7 68.9 49.9 111.4 49.9h271.2c6.6 0 10.8 3.3 13.2 6.1s5 7.5 4 14l-48 303.4c-6.9 43.6-29.1 83.4-62.7 112C815.8 944.2 773 960 728.9 960h-317c-33.1 0-59.9-26.8-59.9-59.9v-455c0-6.1 1.7-12 5-17.1 69.5-109 106.4-234.2 107-364h41.6z m0-64h-44.9C427.2 0 400 27.2 400 60.7c0 127.1-39.1 251.2-112 355.3v484.1c0 68.4 55.5 123.9 123.9 123.9h317c122.7 0 227.2-89.3 246.3-210.5l47.9-303.4c7.8-49.4-30.4-94.1-80.4-94.1H671.6c-50.9 0-90.5-44.4-84.6-95l23.5-203.4C617.7 55 568.7 0 505.6 0z" p-id="2188" :fill="b.isLike ? '#ff6633' : '#82848a'"></path>
          </svg>
          {{b.liked}}
        </div>
      </div>
    </div>
    <div v-if="loading" class="loading-more">
      <div class="loading-spinner"></div>
      <span>加载中...</span>
    </div>
    <div v-else-if="noMore" class="no-more">
      <span>— 已经到底啦 —</span>
    </div>
  </div>
  <foot-bar :active-btn="1"></foot-bar>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>

  const app = new Vue({
    el: "#app",
    data: {
      types: [], // 类型列表
      blogs: [], // 播客列表
      recommendedShops: [], // AI推荐商户
      current: 1, // blog的页码
      searchKeyword: '', // 搜索关键词
      loading: false, // 加载中状态
      noMore: false, // 是否还有更多数据
      pageSize: 10, // 每页数量
      activeTab: 'hot', // 当前tab: hot推荐 / follow关注
      followLastId: 99999999999999, // 关注流滚动分页
      followOffset: 0 // 关注流偏移
    },
    created() {
      this.queryTypes();
      this.queryRecommendShops();
      this.queryHotBlogsScroll();
    },
    methods: {
      switchTab(tab) {
        this.activeTab = tab;
        this.blogs = [];
        this.current = 1;
        this.noMore = false;
        this.followLastId = 99999999999999;
        this.followOffset = 0;
        
        if (tab === 'hot') {
          this.queryHotBlogsScroll();
        } else {
          this.queryFollowBlogs();
        }
      },
      queryFollowBlogs() {
        if (this.loading || this.noMore) return;
        
        this.loading = true;
        axios.get("/blog/of/follow?lastId=" + this.followLastId + "&offset=" + this.followOffset)
          .then(data => {
            if (data && data.list && data.list.length > 0) {
              data.list.forEach(b => {
                b.img = b.images ? b.images.split(",")[0] : '/imgs/icons/default-icon.png';
              });
              this.blogs = this.blogs.concat(data.list);
              
              this.followLastId = data.minTime || 0;
              this.followOffset = data.offset || 0;
              
              if (data.list.length < this.pageSize) {
                this.noMore = true;
              }
            } else {
              this.noMore = true;
            }
          })
          .catch(err => {
            this.$message.error(err)
          })
          .finally(() => {
            this.loading = false;
          });
      },
      queryTypes() {
        axios.get("/shop-type/list")
          .then(data => {
            this.types = data;
          })
          .catch(err => {
            this.$message.error(err)
          })
      },
      queryRecommendShops() {
        // 尝试获取用户坐标
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            pos => {
              const x = pos.coords.longitude;
              const y = pos.coords.latitude;
              axios.get("/shop/recommend?x=" + x + "&y=" + y)
                .then(data => {
                  this.recommendedShops = data;
                })
                .catch(() => {
                  // 获取失败时不带坐标查询
                  this.queryRecommendShopsDefault();
                });
            },
            () => {
              // 获取坐标失败时不带坐标查询
              this.queryRecommendShopsDefault();
            }
          );
        } else {
          this.queryRecommendShopsDefault();
        }
      },
      queryRecommendShopsDefault() {
        axios.get("/shop/recommend")
          .then(data => {
            this.recommendedShops = data;
          })
          .catch(() => {});
      },
      toShopDetail(s) {
        location.href = "/shop-detail.html?id=" + s.id;
      },
      queryHotBlogsScroll() {
        if (this.loading || this.noMore) return;
        
        this.loading = true;
        axios.get("/blog/hot?current=" + this.current)
          .then(data => {
            if (data && data.length > 0) {
              data.forEach(b => {
                b.img = b.images ? b.images.split(",")[0] : '/imgs/icons/default-icon.png';
              });
              this.blogs = this.blogs.concat(data);
              
              // 如果返回的数据少于每页数量，说明没有更多了
              if (data.length < this.pageSize) {
                this.noMore = true;
              }
            } else {
              this.noMore = true;
            }
          })
          .catch(err => {
            this.$message.error(err)
          })
          .finally(() => {
            this.loading = false;
          })
      },
      addLike(b) {
        axios.put("/blog/like/" +b.id)
          .then(data => {
            this.queryBlogById(b)
          })
          .catch(err => {
            this.$message.error(err)
          })
      },
      queryBlogById(b) {
        axios.get("/blog/" + b.id)
          .then(data => {
            b.liked = data.liked;
            b.isLike = data.isLike;
          })
          .catch(() => {
            this.$message.error
            b.liked ++;
          })
      },
      onScroll(e) {
        let scrollTop = e.target.scrollTop;
        let offsetHeight = e.target.offsetHeight;
        let scrollHeight = e.target.scrollHeight;
        
        // 当滚动到距离底部100px时触发加载
        if (scrollTop + offsetHeight > scrollHeight - 100 && !this.loading && !this.noMore) {
          if (this.activeTab === 'hot') {
            this.current++;
            this.queryHotBlogsScroll();
          } else {
            this.queryFollowBlogs();
          }
        }
      },
      toShopList(id, name) {
        location.href = "/shop-list.html?type=" + id + "&name=" + name
      },
      toBlogDetail(b) {
        location.href = "/blog-detail.html?id=" + b.id
      },
      handleSearch() {
        if (this.searchKeyword.trim()) {
          location.href = "/shop-list.html?keyword=" + encodeURIComponent(this.searchKeyword.trim())
        }
      },
      showCitySelect() {
        this.$confirm('切换城市功能开发中', '提示', {
          confirmButtonText: '确定',
          cancelButtonText: '取消',
          type: 'info'
        }).then(() => {
          this.$message({
            type: 'info',
            message: '敬请期待'
          });
        }).catch(() => {
          this.$message({
            type: 'info',
            message: '已取消'
          });
        });
      },
      toPage(i) {
        if (i === 0) {
          location.href = "/blog-edit.html"
        } else if (i === 1) {
          location.href = "/"
        } else if (i === 2) {
          location.href = "/map.html"
        } else if (i === 3) {
          location.href = "/message.html"
        } else if (i === 4) {
          location.href = "/info.html"
        }
      }
    }
  })
</script>
</body>
</html>
