<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>青荐</title>
  <link rel="icon" href="/imgs/logo.svg" type="image/svg+xml">
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/info.css" rel="stylesheet">

  <style type="text/css">
      .el-tabs, .el-tab-pane {
          height: 100%;
      }

      .el-tabs__header {
          height: auto !important;
          margin: 0 !important;
      }

      .el-tabs__nav-wrap {
          margin: 0 !important;
      }

      .el-tabs__nav-wrap::after {
          display: none !important;
      }

      .el-tabs__nav {
          float: none !important;
      }

      .el-tabs__item {
          width: auto !important;
          text-align: center !important;
      }

      .el-tabs__active-bar {
          transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1) !important;
      }

      .el-tabs__content {
          height: calc(100% - 44px);
      }
  </style>

</head>

<body>
<div id="app">
  <div class="top-section">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">个人主页&nbsp;&nbsp;&nbsp;</div>
    </div>
    <div class="basic">
      <div class="basic-icon-wrapper">
        <div class="basic-icon">
          <img :src="user.icon || '/imgs/icons/default-icon.png'" alt="">
        </div>
      </div>
      <div class="basic-info">
        <div class="name">{{user.nickName}}</div>
        <span>杭州</span>
      </div>
      <div class="basic-stats">
        <div class="stat-item" @click="activeName='1'">
            <div class="stat-value">{{info.blogCount || 0}}</div>
            <div class="stat-label">笔记</div>
          </div>
        <div class="stat-item" @click="activeName='3'">
          <div class="stat-value">{{info.fans || 0}}</div>
          <div class="stat-label">粉丝</div>
        </div>
        <div class="stat-item" @click="activeName='4'">
          <div class="stat-value">{{info.followee || 0}}</div>
          <div class="stat-label">关注</div>
        </div>
      </div>
      <div class="basic-actions">
        <div class="edit-btn" @click="toEdit" v-if="isSelf">编辑资料</div>
        <div class="edit-btn" @click="toOrders" v-if="isSelf" style="margin-left:8px;">我的订单</div>
        <div class="msg-btn" @click="openChat" v-if="!isSelf">发消息</div>
        <div class="logout-btn" @click="logout" v-if="isSelf">退出登录</div>
      </div>
    </div>
    <div class="introduce">
      <span v-if="info.introduce">{{info.introduce}}</span>
      <span v-else>添加个人简介，让大家更好的认识你 <i class="el-icon-edit"></i></span>
    </div>
  </div>
  <div class="content">
    <el-tabs v-model="activeName" @tab-click="handleClick">
      <el-tab-pane label="笔记" name="1">
        <div class="blog-scroll-area" @scroll="onBlogScroll">
          <div v-for="b in blogs" :key="b.id" class="blog-item" @click="toBlogDetail(b)">
            <div class="blog-img"><img :src="b.images.split(',')[0]" alt=""></div>
            <div class="blog-info">
              <div class="blog-title">{{b.title}}</div>
              <div class="blog-stats">
                <div class="blog-liked"><img src="/imgs/thumbup.png" alt=""> {{b.liked}}</div>
                <div class="blog-comments"><i class="el-icon-chat-dot-round"></i> {{b.comments}}</div>
              </div>
            </div>
          </div>
          <div v-if="blogLoading" class="loading-more">
            <span>加载中...</span>
          </div>
          <div v-if="blogNoMore && blogs.length > 0" class="no-more">
            <span>— 已经到底啦 —</span>
          </div>
          <div v-if="blogs.length === 0 && !blogLoading" class="empty-state">
            <i class="el-icon-document"></i>
            <p>还没有发布笔记</p>
          </div>
        </div>
      </el-tab-pane>
      <el-tab-pane label="评价" name="2">评价</el-tab-pane>
      <el-tab-pane :label="'粉丝(' + (info.fans || 0) + ')'" name="3">
        <div class="follow-list">
          <div class="follow-item" v-for="f in fansList" :key="f.id">
            <div class="follow-avatar">
              <img :src="f.icon || '/imgs/icons/default-icon.png'" alt="">
            </div>
            <div class="follow-info">
              <div class="follow-name">{{f.nickName}}</div>
            </div>
            <button class="follow-btn" @click="toggleFollow(f)">
              {{f.isFollow ? '已关注' : '关注'}}
            </button>
          </div>
          <div v-if="fansList.length === 0" class="empty-state">
            <i class="el-icon-user"></i>
            <p>还没有粉丝</p>
          </div>
        </div>
      </el-tab-pane>
      <el-tab-pane :label="'关注(' + (info.followee || 0) + ')'" name="4">
        <div class="follow-list">
          <div class="follow-item" v-for="f in followsList" :key="f.id">
            <div class="follow-avatar">
              <img :src="f.icon || '/imgs/icons/default-icon.png'" alt="">
            </div>
            <div class="follow-info">
              <div class="follow-name">{{f.nickName}}</div>
            </div>
            <button class="follow-btn" @click="toggleFollow(f)">
              {{f.isFollow ? '已关注' : '关注'}}
            </button>
          </div>
          <div v-if="followsList.length === 0" class="empty-state">
            <i class="el-icon-user"></i>
            <p>还没有关注任何人</p>
          </div>
        </div>
      </el-tab-pane>
    </el-tabs>
  </div>
  <foot-bar :active-btn="4"></foot-bar>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: {
      user: "",
      activeName: "1",
      info: {},
      blogs: [],
      blogs2: [], // 关注的人的播客
      fansList: [], // 粉丝列表
      followsList: [], // 关注列表
      params: {
        minTime: 0, // 上一次拉取到的时间戳
        offset: 0, // 偏移量
      },
      count: 5,
      isReachBottom: false,
      currentUserId: null, // 当前登录用户ID
      blogPage: 1, // 笔记分页
      blogLoading: false, // 笔记加载中
      blogNoMore: false, // 笔记是否还有更多
    },
    created() {
      this.queryUser();
    },
    computed: {
      isSelf() {
        return this.currentUserId && this.user.id && this.currentUserId === this.user.id;
      }
    },
    methods: {
      load() {
        this.count += 2;
      },
      queryBlogs(clear) {
        if (this.blogLoading || this.blogNoMore) return;
        if (clear) {
          this.blogPage = 1;
          this.blogs = [];
          this.blogNoMore = false;
        }
        this.blogLoading = true;
        axios.get("/blog/of/me?current=" + this.blogPage)
          .then(data => {
            if (data && data.length > 0) {
              this.blogs = this.blogs.concat(data);
              this.blogPage++;
            } else {
              this.blogNoMore = true;
            }
          })
          .catch(err => {
            const msg = err.response?.data?.errorMsg || err.response?.data || "请求失败，请重试";
            this.$message.error(msg);
          })
          .finally(() => {
            this.blogLoading = false;
          });
      },
      queryBlogsOfFollow(clear) {
        if (clear) {
          this.params.offset = 0;
          this.params.minTime = new Date().getTime() + 1;
        }
        let minTime = this.params.minTime;
        let os = this.params.offset;
        axios.get("/blog/of/follow", {
            params: {offset: os, lastId: minTime || new Date().getTime() + 1}
          })
          .then(data => {
            if (!data) {
              return;
            }
            let list = data.list;
            let params = {minTime: data.minTime, offset: data.offset};
            list.forEach(b => b.img = b.images.split(",")[0])
            this.blogs2 = clear ? list : this.blogs2.concat(list);
            this.params = params;
          })
          .catch(e => console.log(e))
      },
      queryUser() {
        axios.get("/user/me")
          .then(data => {
            this.user = data;
            this.currentUserId = data.id;
            this.queryUserInfo();
            this.queryBlogs();
          })
          .catch(err => {
            location.href = "login.html"
          })
      },
      goBack() {
        history.back();
      },
      queryUserInfo() {
        axios.get("/user/info/" + this.user.id)
          .then(data => {
            if (!data) {
              return
            }
            // 保存用户详情
            this.info = data;
            // 保存到本地
            sessionStorage.setItem("userInfo", JSON.stringify(data))
          })
          .catch(err => {
            this.$message.error(err);
          })
      },
      toEdit() {
        location.href = 'info-edit.html'
      },
      toOrders() {
        location.href = 'my-orders.html'
      },
      openChat() {
        location.href = 'chat.html?userId=' + this.user.id;
      },
      logout() {
        axios.post("/user/logout")
          .then(() => {
            // 清理session
            sessionStorage.removeItem("token")
            // 跳转
            location.href = "/"
          })
          .catch(err => {
            const msg = err.response?.data?.errorMsg || err.response?.data || "请求失败，请重试";
            this.$message.error(msg);
          })
      },
      handleClick(r) {
        if (r.name === '3') {
          this.queryFansList();
        } else if (r.name === '4') {
          this.queryFollowsList();
        }
      },
      // 获取粉丝列表
      queryFansList() {
        axios.get('/follow/fans')
          .then(data => {
            this.fansList = data || [];
            // 检查每个粉丝是否已关注
            this.fansList.forEach(f => {
              axios.get('/follow/or/not/' + f.id)
                .then(isFollow => {
                  f.isFollow = isFollow;
                })
                .catch(() => {
                  f.isFollow = false;
                });
            });
          })
          .catch(err => {
            console.error('获取粉丝列表失败', err);
            this.fansList = [];
          });
      },
      // 获取关注列表
      queryFollowsList() {
        axios.get('/follow/list')
          .then(data => {
            this.followsList = data || [];
            this.followsList.forEach(f => {
              f.isFollow = true; // 因为是关注列表，默认都是已关注
            });
          })
          .catch(err => {
            console.error('获取关注列表失败', err);
            this.followsList = [];
          });
      },
      // 跳转笔记详情
      toBlogDetail(b) {
        location.href = '/blog-detail.html?id=' + b.id;
      },
      // 关注/取消关注
      toggleFollow(f) {
        axios.put('/follow/' + f.id + '/' + !f.isFollow)
          .then(() => {
            f.isFollow = !f.isFollow;
            this.$message.success(f.isFollow ? '关注成功' : '已取消关注');
          })
          .catch(err => {
            this.$message.error('操作失败');
          });
      },
      addLike(b) {
        axios.put("/blog/like/" + b.id)
          .then(data => {
            this.queryBlogById(b);
          })
          .catch(err => {
            this.$message.error(err)
          })
      },
      queryBlogById(b) {
        axios.get("/blog/" + b.id)
          .then(data => {
            b.liked = data.liked;
            b.isLike = data.isLike;
          })
          .catch(() => {
            this.$message.error
            b.liked++;
          })
      },
      onScroll(e) {
        let scrollTop = e.target.scrollTop;
        let offsetHeight = e.target.offsetHeight;
        let scrollHeight = e.target.scrollHeight;
        if (scrollTop === 0) {
          // 到顶部了，查询一次
          this.queryBlogsOfFollow(true);
        } else if (scrollTop + offsetHeight + 1 > scrollHeight && !this.isReachBottom) {
          this.isReachBottom = true
          // 再次查询下一页数据
          this.queryBlogsOfFollow();
        } else {
          this.isReachBottom = false
        }
      },
      onBlogScroll(e) {
        if (this.activeName !== '1') return;
        let scrollTop = e.target.scrollTop;
        let offsetHeight = e.target.offsetHeight;
        let scrollHeight = e.target.scrollHeight;
        if (scrollTop + offsetHeight + 1 > scrollHeight && !this.blogLoading && !this.blogNoMore) {
          this.queryBlogs();
        }
      }
    },

  })
</script>
</body>

</html>
